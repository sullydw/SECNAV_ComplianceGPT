name: Regression

on:
  push:
  pull_request:

jobs:
  c7-c10-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run C7 regression
        run: python tools/run_c7_phase1_regression.py

      - name: Run C8 regression
        run: python tools/run_c8_regression.py

      - name: Run C9 regression
        run: python tools/run_c9_regression.py

      - name: Run C10 regression
        run: python tools/run_c10_regression.py
