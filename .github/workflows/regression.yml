name: Regression

on:
  push:
  pull_request:

jobs:
  compliance-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run CCI subject regression
        run: python tools/run_cci_subject_regression.py

      - name: Run CCI ref/encl regression
        run: python tools/run_cci_ref_encl_regression.py

      - name: Run CCI acronym regression
        run: python tools/run_cci_acronym_regression.py

      - name: Run CCI date/time regression
        run: python tools/run_cci_date_time_regression.py

      - name: Run CCI personnel regression
        run: python tools/run_cci_personnel_regression.py

      - name: Run CCI POC regression
        run: python tools/run_cci_poc_regression.py

      - name: Run CCI routing regression
        run: python tools/run_cci_routing_regression.py

      - name: Run context schema regression
        run: python tools/run_context_schema_regression.py

      - name: Run C7 regression
        run: python tools/run_c7_phase1_regression.py

      - name: Run C8 regression
        run: python tools/run_c8_regression.py

      - name: Run C9 regression
        run: python tools/run_c9_regression.py

      - name: Run C10 regression
        run: python tools/run_c10_regression.py
